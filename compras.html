<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras | AshLing Boutique</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    @keyframes fadeInUpCard {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .producto-animada {
      animation: fadeInUpCard 0.7s cubic-bezier(.23,1.02,.32,1) both;
    }
    </style>
</head>
<body>
    <div class="fondo-animado"></div>
    <nav class="barra-navegacion" style="position:relative;">
        <div class="menu-toggle" id="menu-toggle" style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; padding:1rem; position:fixed; top:18px; left:18px; z-index:1100; background:#111; border-radius:12px; box-shadow:0 2px 12px #0006;">
            <img src="iconos/menu.png" alt="Menú" style="width:28px; height:28px;">
            <span style="color:#eab676; font-size:1.2rem; font-weight:bold;">Menú</span>
        </div>
        <ul id="menu-list" style="display:none; flex-direction:column; background:#111; position:fixed; left:18px; top:62px; width:220px; z-index:1000; margin:0; padding:1.5rem 0 1.5rem 0; box-shadow:0 4px 24px #0008; border-radius:0 0 18px 18px; max-height:60vh; overflow-y:auto;">
            <li><a href="index.html"><img src="iconos/menu.png" alt="Inicio" class="icono-nav"> Inicio</a></li>
            <li><a href="carteras.html"><img src="iconos/cartera.png" alt="Carteras" class="icono-nav"> Carteras</a></li>
            <li><a href="perfumes.html"><img src="iconos/perfume.png" alt="Perfumes" class="icono-nav"> Perfumes</a></li>
            <li><a href="joyas.html"><img src="iconos/joyas.png" alt="Joyas" class="icono-nav"> Joyas</a></li>
            <li><a href="ropa de dama.html"><img src="iconos/ropa de dama.png" alt="Ropa de Dama" class="icono-nav"> Ropa de Dama</a></li>
            <li><a href="ropa de caballero.html"><img src="iconos/ropa de caballero.png" alt="Ropa de Caballero" class="icono-nav"> Ropa de Caballero</a></li>
            <li><a href="ropa de niños.html"><img src="iconos/ropa de niños.png" alt="Ropa de Niños" class="icono-nav"> Ropa de Niños</a></li>
            <li><a href="ropa interior femenina.html"><img src="iconos/ropa interior femenina.png" alt="Ropa Interior Femenina" class="icono-nav"> Ropa Interior Femenina</a></li>
            <li><a href="ropa interior masculina.html"><img src="iconos/ropa interior masculina.png" alt="Ropa Interior de Caballero" class="icono-nav"> Ropa Interior de Caballero</a></li>
            <li><a href="ofertas.html"><img src="iconos/ofertas.png" alt="Ofertas de temporada" class="icono-nav"> Ofertas de temporada</a></li>
            <li><a href="compras.html"><img src="iconos/carrito.png" alt="Compras" class="icono-nav"> Compras</a></li>
            <li><a href="redes.html"><img src="iconos/redes sociales.png" alt="Redes Sociales" class="icono-nav"> Redes</a></li>
        </ul>
    </nav>
    <h2 style="color:#eab676; font-size:2.2rem; margin:2.5rem 0 2rem 0; text-align:center; font-family:'Playfair Display',serif; letter-spacing:1px;">Tu carrito de compras</h2>
    <div style="max-width:1200px; margin:0 auto 3rem auto; padding:2rem 1rem; background:rgba(255,255,255,0.07); border-radius:24px; box-shadow:0 4px 32px #0002; display:flex; flex-direction:column; align-items:center;">
        <!-- Área de productos seleccionados -->
        <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <h3 style="color:#eab676; text-align:center; margin-top:0; font-size:1.4rem; font-family:'Playfair Display',serif; letter-spacing:0.5px;">Productos seleccionados</h3>
            <div id="tarjetas-productos" style="display:flex; flex-direction:column; gap:1.5rem; align-items:center; margin-top:1.5rem; width:100%;"></div>
        </div>
        <!-- Formulario de compra debajo de los productos -->
        <form id="form-compra" style="flex:unset; max-width:320px; background:#fff; border-radius:18px; box-shadow:0 2px 12px #0002; padding:1.3rem 1rem; display:flex; flex-direction:column; gap:1rem; min-width:200px; border:1.5px solid #eab676; margin-top:2rem;">
            <label style="color:#222; font-weight:600; font-size:1.01rem;">Nombre completo
                <input type="text" name="nombre" required style="width:100%; padding:0.5rem; border-radius:8px; border:1.2px solid #eab676; margin-top:0.2rem; font-size:0.97rem; background:#f9f6f2;">
            </label>
            <label style="color:#222; font-weight:600; font-size:1.01rem;">Teléfono
                <input type="tel" name="telefono" required style="width:100%; padding:0.5rem; border-radius:8px; border:1.2px solid #eab676; margin-top:0.2rem; font-size:0.97rem; background:#f9f6f2;">
            </label>
            <label style="color:#222; font-weight:600; font-size:1.01rem;">Dirección de entrega
                <textarea name="direccion" required style="width:100%; padding:0.5rem; border-radius:8px; border:1.2px solid #eab676; margin-top:0.2rem; min-height:50px; font-size:0.97rem; background:#f9f6f2;"></textarea>
            </label>
            <button type="submit" style="background:linear-gradient(90deg,#eab676 60%,#fffbe6 100%); color:#222; border:none; border-radius:16px; padding:0.7rem 1rem; font-weight:bold; font-size:1rem; cursor:pointer; margin-top:0.7rem; display:flex; align-items:center; justify-content:center; gap:0.6rem; box-shadow:0 1px 4px #eab67633; transition:background 0.2s;">
                <img src="iconos/carrito.png" alt="WhatsApp" style="width:20px; height:20px; vertical-align:middle;"> Solicitar Información por WhatsApp
            </button>
        </form>
    </div>
    <script>
    // Mostrar productos seleccionados desde localStorage
    var productosSeleccionados = JSON.parse(localStorage.getItem('productosSeleccionados') || '[]');
    var tarjetas = document.getElementById('tarjetas-productos');
    if(productosSeleccionados.length > 0) {
        tarjetas.innerHTML = '';
        productosSeleccionados.forEach(function(prod, idx) {
            var div = document.createElement('div');
            div.className = 'producto producto-animada';
            div.style.background = 'linear-gradient(120deg,#fffbe6 80%,#eab67622 100%)';
            div.style.color = '#222';
            div.style.borderRadius = '16px';
            div.style.boxShadow = '0 2px 16px #eab67633';
            div.style.padding = '1.2rem 1.1rem 1.1rem 1.1rem';
            div.style.width = '320px';
            div.style.display = 'flex';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'center';
            div.style.position = 'relative';
            div.style.opacity = '0';
            div.style.animationDelay = (idx * 0.12) + 's';
            div.innerHTML = `
                <img src='${prod.imagen}' alt='${prod.nombre}' style='width:120px;height:120px;object-fit:cover;border-radius:12px;background:#eee; margin-bottom:0.9rem; box-shadow:0 2px 8px #eab67633;'>
                <h3 style=\"color:#eab676; font-size:1.18rem; margin:0.3rem 0 0.1rem 0; font-family:'Playfair Display',serif;\">${prod.nombre}</h3>
                <p style=\"margin:0.1rem 0;font-size:1.01rem; color:#444;\"><b>Código:</b> ${prod.codigo}</p>
                <p style=\"margin:0.1rem 0 0.2rem 0;font-size:0.99rem; color:#555;\">${prod.descripcion}</p>
                <button class='eliminar-producto' data-idx='${idx}' style='margin-top:0.8rem; background:#eab676; color:#222; border:none; border-radius:10px; padding:0.5rem 1.2rem; font-weight:bold; font-size:1rem; cursor:pointer; box-shadow:0 1px 6px #eab67633; transition:background 0.2s;'>Eliminar</button>
            `;
            tarjetas.appendChild(div);
            setTimeout(function() { div.style.opacity = '1'; }, 60);
        });
        // Botones eliminar
        tarjetas.querySelectorAll('.eliminar-producto').forEach(function(btn) {
            btn.onclick = function() {
                var idx = Number(this.getAttribute('data-idx'));
                productosSeleccionados.splice(idx, 1);
                localStorage.setItem('productosSeleccionados', JSON.stringify(productosSeleccionados));
                location.reload();
            };
        });
    } else {
        tarjetas.innerHTML = '<div style="color:#888; text-align:center;">No hay productos seleccionados.</div>';
    }
    // Enviar solicitud de información a WhatsApp con productos
    document.getElementById('form-compra').onsubmit = function(e) {
        e.preventDefault();
        var nombre = this.nombre.value.trim();
        var telefono = this.telefono.value.trim();
        var direccion = this.direccion.value.trim();
        var productos = productosSeleccionados.map(function(p) {
            return `${p.nombre} (Código: ${p.codigo})`;
        }).join(', ');
        var mensaje = `Hola, soy ${nombre}.\nMi teléfono: ${telefono}\nDirección: ${direccion}\nQuiero solicitar información de los siguientes productos en AshLing Boutique.\nProductos: ${productos}`;
        var url = 'https://api.whatsapp.com/send?phone=50379468807&text=' + encodeURIComponent(mensaje);
        window.open(url, '_blank');
        this.reset();
        // Limpiar productos seleccionados y actualizar vista
        localStorage.removeItem('productosSeleccionados');
        tarjetas.innerHTML = '<div style=\"color:#888; text-align:center;\">No hay productos seleccionados.</div>';
    };
    // Menú desplegable responsive
    function toggleMenu() {
        const menu = document.getElementById('menu-list');
        menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    }
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu-list');
    toggle.onclick = toggleMenu;
    document.addEventListener('click', function(e) {
        if (!toggle.contains(e.target) && !menu.contains(e.target)) {
            menu.style.display = 'none';
        }
    });
    window.addEventListener('resize', function() {
        if(window.innerWidth > 900) {
            menu.style.display = 'flex';
        } else {
            menu.style.display = 'none';
        }
    });
    </script>
</body>
</html>
