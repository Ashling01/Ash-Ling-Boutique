<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteras | AshLing Boutique</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes fadeInUpCard {
          from {
            opacity: 0;
            transform: translateY(40px) scale(0.97);
          }
          to {
            opacity: 1;
            transform: translateY(0) scale(1);
          }
        }
        .producto-animada {
          animation: fadeInUpCard 0.7s cubic-bezier(.23,1.02,.32,1) both;
        }
        @keyframes pulseMsg {
          0% { box-shadow:0 4px 32px #eab6d655,0 2px 8px #fffbe6aa; transform:scale(1); }
          100% { box-shadow:0 8px 48px #eab6d699,0 4px 16px #fffbe6cc; transform:scale(1.04); }
        }
    </style>
</head>
<body>
    <div class="fondo-animado"></div>
    <nav class="barra-navegacion" style="position:relative;">
        <div class="menu-toggle" id="menu-toggle" style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; padding:1rem; position:fixed; top:18px; left:18px; z-index:1100; background:#111; border-radius:12px; box-shadow:0 2px 12px #0006;">
            <img src="iconos/menu.png" alt="Menú" style="width:28px; height:28px;">
            <span style="color:#eab676; font-size:1.2rem; font-weight:bold;">Menú</span>
        </div>
        <ul id="menu-list" style="display:none; flex-direction:column; background:#111; position:fixed; left:18px; top:62px; width:220px; z-index:1000; margin:0; padding:1.5rem 0 1.5rem 0; box-shadow:0 4px 24px #0008; border-radius:0 0 18px 18px; max-height:60vh; overflow-y:auto;">
            <li><a href="index.html"><img src="iconos/menu.png" alt="Inicio" class="icono-nav"> Inicio</a></li>
            <li><a href="carteras.html"><img src="iconos/cartera.png" alt="Carteras" class="icono-nav"> Carteras</a></li>
            <li><a href="perfumes.html"><img src="iconos/perfume.png" alt="Perfumes" class="icono-nav"> Perfumes</a></li>
            <li><a href="joyas.html"><img src="iconos/joyas.png" alt="Joyas" class="icono-nav"> Joyas</a></li>
            <li><a href="ropa de dama.html"><img src="iconos/ropa de dama.png" alt="Ropa de Dama" class="icono-nav"> Ropa de Dama</a></li>
            <li><a href="ropa de caballero.html"><img src="iconos/ropa de caballero.png" alt="Ropa de Caballero" class="icono-nav"> Ropa de Caballero</a></li>
            <li><a href="ropa de niños.html"><img src="iconos/ropa de niños.png" alt="Ropa de Niños" class="icono-nav"> Ropa de Niños</a></li>
            <li><a href="ropa interior femenina.html"><img src="iconos/ropa interior femenina.png" alt="Ropa Interior Femenina" class="icono-nav"> Ropa Interior Femenina</a></li>
            <li><a href="ropa interior masculina.html"><img src="iconos/ropa interior masculina.png" alt="Ropa Interior de Caballero" class="icono-nav"> Ropa Interior de Caballero</a></li>
            <li><a href="ofertas.html"><img src="iconos/ofertas.png" alt="Ofertas de temporada" class="icono-nav"> Ofertas de temporada</a></li>
            <li><a href="compras.html"><img src="iconos/carrito.png" alt="Compras" class="icono-nav"> Compras</a></li>
            <li><a href="redes.html"><img src="iconos/redes sociales.png" alt="Redes Sociales" class="icono-nav"> Redes</a></li>
        </ul>
    </nav>
    <h2 style="color:#eab676; font-size:2rem; margin-bottom:2rem; text-align:center;">Carteras</h2>
    <div class='productos-lista' style="
        display: flex;
        flex-wrap: wrap;
        gap: 2.5rem;
        justify-content: center;
        align-items: center;
        width: 100%;
        min-height: 260px;
        text-align: center;
        max-width: 520px;
        margin: 0 auto;
        background: #fffbe6;
        border-radius: 28px;
        box-shadow: 0 8px 32px #eab6d655, 0 2px 12px #eab67633;
        border: 2px solid #eab676;
        padding: 2.5rem 2rem 2rem 2rem;
    ">
        <div class="producto producto-animada" style="
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px #eab6d633, 0 2px 8px #eab67622;
            padding: 1.5rem 1.2rem 1.2rem 1.2rem;
            border: 1.5px solid #eab676;
            max-width: 220px;
            margin-bottom: 1rem;
            transition: box-shadow 0.2s;
        ">
            <img src="carteras/cartera rosada.jpg" alt="Cartera" style="
                width: 160px;
                height: 180px;
                object-fit: cover;
                border-radius: 14px;
                box-shadow: 0 2px 16px #eab6d655, 0 1px 4px #fffbe6aa;
                margin-bottom: 1.1rem;
                border: 2px solid #eab676;
                background: #fffbe6;
            ">
            <span style="
                font-size: 1.15rem;
                color: #a67c52;
                font-family: 'Playfair Display', serif;
                font-weight: 600;
                letter-spacing: 1px;
                margin-top: 0.2rem;
            ">Cartera</span>
        </div>
        <span id="mensaje-carteras" style="
            background: #eab6d6;
            border-radius: 22px;
            padding: 1.5rem 2.5rem;
            box-shadow: 0 6px 32px #eab6d655, 0 2px 8px #fffbe6aa;
            display: inline-block;
            font-size: 2.1rem;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            min-width: 260px;
            color: #6d4c2c;
            border: 2px solid #eab676;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
            transition: box-shadow 0.2s;
        "></span>
    </div>
    <script>
        // Animación de escritura para mensaje
        const mensaje = "¡Próximamente las carteras más exclusivas y elegantes para realzar tu estilo solo en AshLing Boutique!";

        let i = 0;
        function escribirMensaje() {
            if(i <= mensaje.length) {
                document.getElementById('mensaje-carteras').textContent = mensaje.slice(0, i);
                i++;
                setTimeout(escribirMensaje, 60);
            }
        }
        escribirMensaje();
        // Función para ampliar imagen al hacer clic
        function ampliarImagen(imgSrc, alt) {
            var overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100vw';
            overlay.style.height = '100vh';
            overlay.style.background = 'rgba(0,0,0,0.8)';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.zIndex = '10000';
            overlay.onclick = function() { overlay.remove(); };
            var img = document.createElement('img');
            img.src = imgSrc;
            img.alt = alt || '';
            img.style.maxWidth = '90vw';
            img.style.maxHeight = '90vh';
            img.style.borderRadius = '18px';
            img.style.boxShadow = '0 4px 32px #000b';
            overlay.appendChild(img);
            document.body.appendChild(overlay);
        }
        // Asigna el evento a todas las imágenes de producto
        window.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.producto img').forEach(function(img) {
                img.style.cursor = 'zoom-in';
                img.onclick = function(e) {
                    e.stopPropagation();
                    ampliarImagen(this.src, this.alt);
                };
            });
        });
        // Menú desplegable responsive
        function toggleMenu() {
            const menu = document.getElementById('menu-list');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('menu-list');
        toggle.onclick = toggleMenu;
        document.addEventListener('click', function(e) {
            if (!toggle.contains(e.target) && !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });
        window.addEventListener('resize', function() {
            if(window.innerWidth > 900) {
                menu.style.display = 'flex';
            } else {
                menu.style.display = 'none';
            }
        });
    </script>
</body>
</html>
