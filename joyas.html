<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyas | AshLing Boutique</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes fadeInUpCard {
          from {
            opacity: 0;
            transform: translateY(40px) scale(0.97);
          }
          to {
            opacity: 1;
            transform: translateY(0) scale(1);
          }
        }
        .producto-animada {
          animation: fadeInUpCard 0.7s cubic-bezier(.23,1.02,.32,1) both;
        }
    </style>
</head>
<body>
    <div class="fondo-animado"></div>
    <nav class="barra-navegacion" style="position:relative;">
        <div class="menu-toggle" id="menu-toggle" style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; padding:1rem; position:fixed; top:18px; left:18px; z-index:1100; background:#111; border-radius:12px; box-shadow:0 2px 12px #0006;">
            <img src="iconos/menu.png" alt="Menú" style="width:28px; height:28px;">
            <span style="color:#eab676; font-size:1.2rem; font-weight:bold;">Menú</span>
        </div>
        <ul id="menu-list" style="display:none; flex-direction:column; background:#111; position:fixed; left:18px; top:62px; width:220px; z-index:1000; margin:0; padding:1.5rem 0 1.5rem 0; box-shadow:0 4px 24px #0008; border-radius:0 0 18px 18px; max-height:60vh; overflow-y:auto;">
            <li><a href="index.html"><img src="iconos/menu.png" alt="Inicio" class="icono-nav"> Inicio</a></li>
            <li><a href="carteras.html"><img src="iconos/cartera.png" alt="Carteras" class="icono-nav"> Carteras</a></li>
            <li><a href="perfumes.html"><img src="iconos/perfume.png" alt="Perfumes" class="icono-nav"> Perfumes</a></li>
            <li><a href="joyas.html"><img src="iconos/joyas.png" alt="Joyas" class="icono-nav"> Joyas</a></li>
            <li><a href="ropa de dama.html"><img src="iconos/ropa de dama.png" alt="Ropa de Dama" class="icono-nav"> Ropa de Dama</a></li>
            <li><a href="ropa de caballero.html"><img src="iconos/ropa de caballero.png" alt="Ropa de Caballero" class="icono-nav"> Ropa de Caballero</a></li>
            <li><a href="ropa de niños.html"><img src="iconos/ropa de niños.png" alt="Ropa de Niños" class="icono-nav"> Ropa de Niños</a></li>
            <li><a href="ropa interior femenina.html"><img src="iconos/ropa interior femenina.png" alt="Ropa Interior Femenina" class="icono-nav"> Ropa Interior Femenina</a></li>
            <li><a href="ropa interior masculina.html"><img src="iconos/ropa interior masculina.png" alt="Ropa Interior de Caballero" class="icono-nav"> Ropa Interior de Caballero</a></li>
            <li><a href="ofertas.html"><img src="iconos/ofertas.png" alt="Ofertas de temporada" class="icono-nav"> Ofertas de temporada</a></li>
            <li><a href="compras.html"><img src="iconos/carrito.png" alt="Compras" class="icono-nav"> Compras</a></li>
            <li><a href="redes.html"><img src="iconos/redes sociales.png" alt="Redes Sociales" class="icono-nav"> Redes</a></li>
        </ul>
    </nav>
    <h2 style="color:#eab676; font-size:2rem; margin-bottom:2rem; text-align:center;">Joyas</h2>
    <div class='productos-lista' id="productos-lista" style="display:flex; flex-wrap:wrap; gap:2rem; justify-content:center;">
        <!-- Las tarjetas de productos se generarán automáticamente aquí -->
    </div>
    <div id="mensaje-producto-agregado" style="display:none;position:fixed;top:30px;left:50%;transform:translateX(-50%);background:#eab676;color:#222;padding:1rem 2rem;border-radius:18px;box-shadow:0 2px 16px #0005;font-size:1.1rem;z-index:2000;font-weight:bold;transition:opacity 0.3s;opacity:0;">
        Producto agregado: <span id="nombre-producto-agregado"></span> (<span id="codigo-producto-agregado"></span>)
    </div>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const menuList = document.getElementById('menu-list');
        menuToggle.addEventListener('click', () => {
            const isVisible = menuList.style.display === 'flex';
            menuList.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) {
                menuList.style.animation = 'fadeIn 0.5s forwards';
            }
        });
        function mostrarMensajeProductoAgregado(nombre, codigo) {
    var mensaje = document.getElementById('mensaje-producto-agregado');
    document.getElementById('nombre-producto-agregado').textContent = nombre;
    document.getElementById('codigo-producto-agregado').textContent = codigo;
    mensaje.style.display = 'block';
    setTimeout(function() {
        mensaje.style.opacity = '1';
    }, 10);
    setTimeout(function() {
        mensaje.style.opacity = '0';
        setTimeout(function() {
            mensaje.style.display = 'none';
        }, 400);
    }, 1600);
}

function agregarAComprasDesdeTarjeta(btn) {
    var card = btn.closest('.producto');
    var img = card.querySelector('img');
    var nombre = card.querySelector('h3').textContent.trim();
    var codigo = img.src.split('/').pop().split('.')[0];
    var descripcion = card.querySelectorAll('p')[1].textContent.trim();
    var producto = { nombre, codigo, imagen: img.getAttribute('src'), descripcion };
    var productos = JSON.parse(localStorage.getItem('productosTienda') || '[]');
    productos.push(producto);
    localStorage.setItem('productosTienda', JSON.stringify(productos));
    mostrarMensajeProductoAgregado(nombre, codigo);
}

// Generación automática de tarjetas desde joyas.json
fetch('joyas.json')
  .then(res => res.json())
  .then(productos => {
    const contenedor = document.getElementById('productos-lista');
    contenedor.innerHTML = '';
    productos.forEach(producto => {
      const div = document.createElement('div');
      div.className = 'producto producto-animada';
      div.innerHTML = `
        <img src='${producto.imagen}' alt='${producto.codigo}' style='width:120px;height:120px;object-fit:cover;border-radius:10px;background:#eee;'>
        <h3>${producto.nombre}</h3>
        <p><b>Código:</b> ${producto.codigo}</p>
        <p>${producto.descripcion}</p>
        <button style="margin-top:0.8rem; background:#eab676; color:#222; border:none; border-radius:20px; padding:0.5rem 1.2rem; font-weight:bold; cursor:pointer; transition:background 0.2s; font-size:1rem;" onclick="agregarAComprasDesdeTarjeta(this)">Agregar a compras</button>
      `;
      contenedor.appendChild(div);
    });
  });
    </script>
</body>
</html>
