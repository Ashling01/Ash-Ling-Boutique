    <script>
    // Menú desplegable
    function toggleMenu() {
        const menu = document.getElementById('menu-list');
        menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    }
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu-list');
    toggle.onclick = toggleMenu;
    document.addEventListener('click', function(e) {
        if (!toggle.contains(e.target) && !menu.contains(e.target)) {
            menu.style.display = 'none';
        }
    });
    window.addEventListener('resize', function() {
        if(window.innerWidth > 900) {
            menu.style.display = 'flex';
        } else {
            menu.style.display = 'none';
        }
    });
    </script>
    <h2 style="color:#eab676; font-size:2rem; margin-bottom:2rem; text-align:center;">Ropa de Niños</h2>
    <div class='productos-lista' style="
        display: flex;
        flex-wrap: wrap;
        gap: 2.5rem;

        border: 2px solid #eab676;
        padding: 2.5rem 2rem 2rem 2rem;
    ">
        <div class="producto producto-animada" style="
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px #eab6d633, 0 2px 8px #eab67622;

            max-width: 220px;
            margin-bottom: 1rem;
            transition: box-shadow 0.2s;
        ">
            <img src="ropa de niños/niña01.jpg" alt="Ropa de Niños de muestra" style="

                object-fit: cover;

                margin-bottom: 1.1rem;

            ">

        <span id="mensaje-ninos" style="
            background: #eab6d6;
            border-radius: 22px;
            padding: 1.5rem 2.5rem;

            transition: box-shadow 0.2s;
        "></span>
    </div>
    <script>
function agregarACompras(nombre, codigo, precio, imagen, descripcion) {
    var productos = JSON.parse(localStorage.getItem('productosSeleccionados') || '[]');
    productos.push({nombre, codigo, precio, imagen, descripcion});
    localStorage.setItem('productosSeleccionados', JSON.stringify(productos));
    // Mensaje visual de agregado
    var msg = document.createElement('div');
    msg.textContent = 'Producto agregado al carrito';
    msg.style.position = 'fixed';
    msg.style.top = '30px';
    msg.style.left = '50%';
    msg.style.transform = 'translateX(-50%)';
    msg.style.background = '#25d366';
    msg.style.color = '#222';
    msg.style.padding = '1rem 2rem';
    msg.style.borderRadius = '16px';
    msg.style.fontWeight = 'bold';
    msg.style.fontSize = '1.1rem';
    msg.style.boxShadow = '0 2px 12px #0003';
    msg.style.zIndex = '9999';
    document.body.appendChild(msg);
    setTimeout(function(){ msg.remove(); }, 1600);
}
// Función para ampliar imagen al hacer clic
function ampliarImagen(imgSrc, alt) {
    var overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = '0';
    overlay.style.left = '0';
    overlay.style.width = '100vw';
    overlay.style.height = '100vh';
    overlay.style.background = 'rgba(0,0,0,0.8)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = '10000';
    overlay.onclick = function() { overlay.remove(); };
    var img = document.createElement('img');
    img.src = imgSrc;
    img.alt = alt || '';
    img.style.maxWidth = '90vw';
    img.style.maxHeight = '90vh';
    img.style.borderRadius = '18px';
    img.style.boxShadow = '0 4px 32px #000b';
    overlay.appendChild(img);
    document.body.appendChild(overlay);
}
// Asigna el evento a todas las imágenes de producto
window.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.producto img').forEach(function(img) {
        img.style.cursor = 'zoom-in';
        img.onclick = function(e) {
            e.stopPropagation();
            ampliarImagen(this.src, this.alt);
        };
    });
});
    // Animación de escritura para mensaje de ropa de niños
    const mensajeNinos = "¡Muy pronto la moda más divertida y cómoda para los pequeños de la casa en AshLing Boutique!";
    let iNinos = 0;
    function escribirMensajeNinos() {
        if(iNinos <= mensajeNinos.length) {
            document.getElementById('mensaje-ninos').textContent = mensajeNinos.slice(0, iNinos);
            iNinos++;
            setTimeout(escribirMensajeNinos, 60);
        }
    }
    escribirMensajeNinos();
</script>
